name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev libltdl-dev

      - name: Install buildozer
        run: pip install buildozer

      - name: Build APK with buildozer
        run: buildozer android debug
        env:
          BUILDOZER_ANDROID_SKIP_UPDATE: '1'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: english-master-apk
          path: bin/*.apk
          if-no-files-found: warn
