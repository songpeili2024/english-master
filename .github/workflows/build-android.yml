name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Cython (fix missing .c files from .pyx)
        run: |
          pip install cython

      - name: Build APK with buildozer
        run: echo y | buildozer android debug
        env:
          BUILDOZER_ANDROID_SKIP_UPDATE: '1'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: english-master-apk
          path: bin/*.apk
          if-no-files-found: warn
